name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Publish Release Asset
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          REPO_VERSION="$(./scripts/get_version.sh)"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            EXPECTED_TAG="v${REPO_VERSION}"
            if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
              echo "error: tag ${TAG_NAME} does not match VERSION (${EXPECTED_TAG})" >&2
              exit 1
            fi
            VERSION="${REPO_VERSION}"
          else
            VERSION="${REPO_VERSION}"
            TAG_NAME="v${REPO_VERSION}"
          fi
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x scripts/build_app.sh
          ./scripts/build_app.sh

      - name: Package app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "Silent Timer.app" "dist/Silent-Timer-${{ steps.version.outputs.version }}.zip"
          shasum -a 256 "dist/Silent-Timer-${{ steps.version.outputs.version }}.zip" > "dist/Silent-Timer-${{ steps.version.outputs.version }}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/Silent-Timer-${{ steps.version.outputs.version }}.zip
            dist/Silent-Timer-${{ steps.version.outputs.version }}.sha256
